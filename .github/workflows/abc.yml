name: abc
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/ItsBrank/CNRL.git
          git fetch upstream
          git merge upstream/master --allow-unrelated-histories
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
